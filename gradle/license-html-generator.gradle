ext.parseLicenseOverrides = { File yamlFile ->
    def overrides = []
    yamlFile.eachLine { line ->
        if (line.trim().startsWith('- artifact:')) {
            def artifact = line.trim().substring(12).trim()
            def parts = artifact.split(':')
            overrides << [
                group: parts[0],
                name: parts[1],
                version: parts.size() > 2 ? parts[2] : '+',
                data: [:]
            ]
        } else if (line.trim().startsWith('artifact:')) {
            def artifact = line.trim().substring(10).trim()
            def parts = artifact.split(':')
            overrides << [
                group: parts[0],
                name: parts[1],
                version: parts.size() > 2 ? parts[2] : '+',
                data: [:]
            ]
        } else if (line.startsWith('  ') && !overrides.isEmpty()) {
            def kv = line.trim().split(':', 2)
            if (kv.size() == 2) {
                overrides.last().data[kv[0].trim()] = kv[1].trim()
            }
        }
    }
    return overrides
}

ext.findPomFile = { String group, String name, String version, File pomCacheDir ->
    def cached = new File(pomCacheDir, "${group.replace('.', '_')}_${name}_${version}.pom")
    if (cached.exists()) return cached

    def localPath = new File(gradle.gradleUserHomeDir, "caches/modules-2/files-2.1/${group}/${name}/${version}")
    if (localPath.exists()) {
        def pomFiles = []
        localPath.eachFileRecurse { f ->
            if (f.name.endsWith('.pom')) pomFiles << f
        }
        if (!pomFiles.isEmpty()) {
            cached.parentFile.mkdirs()
            cached.bytes = pomFiles.first().bytes
            return cached
        }
    }

    def groupPath = group.replace('.', '/')
    def pomUrls = [
        "https://dl.google.com/dl/android/maven2/${groupPath}/${name}/${version}/${name}-${version}.pom",
        "https://repo.maven.apache.org/maven2/${groupPath}/${name}/${version}/${name}-${version}.pom",
        "https://jitpack.io/${groupPath}/${name}/${version}/${name}-${version}.pom"
    ]
    for (pomUrl in pomUrls) {
        try {
            def connection = new URL(pomUrl).openConnection()
            connection.setRequestProperty('User-Agent', 'Gradle')
            connection.setConnectTimeout(10000)
            connection.setReadTimeout(10000)
            if (connection.getResponseCode() == 200) {
                cached.parentFile.mkdirs()
                cached.bytes = connection.getInputStream().bytes
                connection.disconnect()
                return cached
            }
            connection.disconnect()
        } catch (Exception ignored) {}
    }
    return null
}

ext.parsePomFile = { File pomFile ->
    def slurper = new XmlSlurper(false, false)
    def pom = slurper.parse(pomFile)

    def pomName = pom.name?.text() ?: pom.artifactId?.text()
    def pomUrl = pom.url?.text()
    def orgName = pom.organization?.name?.text()

    def devs = []
    pom.developers?.developer?.each { dev ->
        if (dev.name?.text()) devs << dev.name.text()
    }

    def licList = []
    pom.licenses?.license?.each { lic ->
        licList << [name: lic.name?.text(), url: lic.url?.text()]
    }

    return [
        name: pomName,
        url: pomUrl,
        organizationName: orgName,
        developers: devs.join(', '),
        licenses: licList
    ]
}

ext.matchesArtifact = { String ruleGroup, String ruleName, String ruleVersion, String depGroup, String depName, String depVersion ->
    return (ruleGroup == '+' || ruleGroup == depGroup) &&
           (ruleName == '+' || ruleName == depName) &&
           (ruleVersion == '+' || ruleVersion == depVersion)
}

ext.findLicenseOverride = { overrides, String group, String name, String version ->
    for (ov in overrides) {
        if (matchesArtifact(ov.group, ov.name, ov.version, group, name, version)) {
            return ov.data
        }
    }
    return null
}

ext.getLicenseHtml = { String licenseUrl, String copyrightHolder ->
    if (licenseUrl.contains('apache.org/licenses/LICENSE-2.0')) {
        return apacheLicenseHtml
    } else if (licenseUrl.contains('opensource.org/licenses/MIT') || licenseUrl.contains('api.github.com/licenses/mit')) {
        return mitLicenseHtml.replace('COPYRIGHT_HOLDER', copyrightHolder)
    } else if (licenseUrl.contains('creativecommons.org/publicdomain/zero')) {
        return cc0LicenseHtml
    } else if (licenseUrl.contains('BSD-2-Clause') || licenseUrl.contains('bsd-2-clause') || licenseUrl.contains('bsd2') || licenseUrl.contains('licenses/BSD')) {
        return bsd2ClauseLicenseHtml.replace('COPYRIGHT_HOLDER', copyrightHolder)
    } else if (licenseUrl.contains('BSD-3-Clause') || licenseUrl.contains('bsd-3-clause') || licenseUrl.contains('bsd3')) {
        return bsd3ClauseLicenseHtml.replace('COPYRIGHT_HOLDER', copyrightHolder)
    } else {
        return "<p>${licenseUrl}</p>"
    }
}

tasks.register('generateLicenseHtml') {
    group = 'license'
    description = 'Generate HTML licenses page from dependencies'

    doLast {
        def subprojectNames = rootProject.subprojects.collect { it.name }.toSet()

        def classpathConfig = null
        for (configName in ['releaseCompileClasspath', 'releaseRuntimeClasspath', 'compileClasspath', 'runtimeClasspath']) {
            try {
                classpathConfig = configurations.getByName(configName)
                break
            } catch (Exception ignored) {}
        }
        if (classpathConfig == null) {
            logger.warn('Could not find any classpath configuration')
            return
        }

        def yamlFile = file('licenses.yml')
        def overrides = yamlFile.exists() ? parseLicenseOverrides(yamlFile) : []

        def pomCacheDir = file("${project.buildDir}/license-pom-cache")
        pomCacheDir.mkdirs()

        def seenArtifacts = new HashSet<String>()
        def licenseTextMap = new LinkedHashMap<String, String>()
        def libraries = []
        def resolvedComponents = classpathConfig.incoming.resolutionResult.allComponents
        resolvedComponents.each { component ->
            def group = component.moduleVersion.group ?: ''
            def name = component.moduleVersion.name ?: ''
            def version = component.moduleVersion.version ?: ''

            if (!group || group.trim().isEmpty() || subprojectNames.contains(name)) return

            def key = "${group}:${name}"
            if (seenArtifacts.contains(key)) return
            seenArtifacts.add(key)

            def pomFile = findPomFile(group, name, version, pomCacheDir)
            if (!pomFile) {
                logger.lifecycle("POM not found for ${group}:${name}:${version}, skipping")
                return
            }

            def pomData = parsePomFile(pomFile)
            def override = findLicenseOverride(overrides, group, name, version)

            def finalName = override?.name ?: pomData.name
            def finalCopyrightHolder = override?.copyrightHolder ?: pomData.organizationName ?: pomData.developers
            def finalUrl = override?.url ?: pomData.url
            def firstLicense = pomData.licenses ? pomData.licenses[0] : null
            def finalLicenseName = override?.license ?: firstLicense?.name
            def finalLicenseUrl = override?.licenseUrl ?: firstLicense?.url

            if (!finalName || !finalCopyrightHolder) {
                logger.lifecycle("Missing required fields for ${group}:${name}:${version} - name: ${finalName}, copyrightHolder: ${finalCopyrightHolder}")
                return
            }

            if (!finalLicenseUrl) {
                logger.lifecycle("Missing license URL for ${group}:${name}:${version}")
                finalLicenseUrl = ''
            }

            def licenseHtml = getLicenseHtml(finalLicenseUrl, finalCopyrightHolder)
            def templateId
            if (licenseTextMap.containsKey(licenseHtml)) {
                templateId = licenseTextMap[licenseHtml]
            } else {
                templateId = "lic-${licenseTextMap.size()}"
                licenseTextMap[licenseHtml] = templateId
            }

            libraries << [
                name: finalName,
                copyrightHolder: finalCopyrightHolder,
                url: finalUrl,
                licenseUrl: finalLicenseUrl,
                templateId: templateId
            ]
        }

        libraries.sort { a, b -> a.name.toLowerCase() <=> b.name.toLowerCase() }

        def outputFile = file('src/main/assets/licenses.html')
        outputFile.parentFile.mkdirs()
        outputFile.withWriter { writer ->
            writer.write('<!DOCTYPE html>\n')
            writer.write('<html>\n')
            writer.write('<head>\n')
            writer.write('  <meta charset="UTF-8"/>\n')
            writer.write('  <meta name="viewport" content="width=device-width,initial-scale=1">\n')
            writer.write('  <style>\n')
            writer.write(generateLicenseHtmlCss.stripIndent().trim())
            writer.write('\n  </style>\n')
            writer.write('</head>\n')
            writer.write('<body>\n')
            writer.write('    <div style="display:none">\n')
            licenseTextMap.each { html, id ->
                writer.write("      <template id=\"${id}\">")
                writer.write(html)
                writer.write('</template>\n')
            }
            writer.write('    </div>\n')

            libraries.each { lib ->
                writer.write('     <div class="library">\n')
                writer.write("       <!-- ${lib.licenseUrl} -->\n")
                writer.write("       <h1 class=\"title\">${lib.name}</h1>\n")
                writer.write("       <p class=\"notice\">Copyright &copy; ${lib.copyrightHolder}. All rights reserved.</p>\n")
                if (lib.url) {
                    writer.write("       <p><a href=\"${lib.url}\">${lib.url}</a></p>\n")
                }
                writer.write('       <input type="checkbox"><label></label>\n')
                writer.write("       <div class=\"license\" data-tid=\"${lib.templateId}\"></div>\n")
                writer.write('     </div>\n')
            }

            writer.write('    <script>document.querySelectorAll(\'[data-tid]\').forEach(function(e){var t=document.getElementById(e.dataset.tid);if(t)e.appendChild(t.content.cloneNode(true))});</script>\n')
            writer.write('</body>\n')
            writer.write('</html>\n')
        }

        logger.lifecycle("Generated licenses.html with ${libraries.size()} libraries")
    }
}
